<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crop Rotation Game</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="main-container">



<div class="game-area">

<h1>🌾 Crop Rotation Game</h1>

<div class="game-info">

Round: <span id="round">1</span> |
Score: <span id="score">0</span>

</div>

<div class="game-container">

<div class="plots">

<div class="plot" id="plot1">Year 1</div>
<div class="plot" id="plot2">Year 2</div>
<div class="plot" id="plot3">Year 3</div>
<div class="plot" id="plot4">Year 4</div>

</div>

<div class="crops" id="cropContainer"></div>

</div>

<div class="game-buttons">

<button onclick="clearPlots()">🧹 Clear</button>
<button onclick="undoMove()">↩ Undo</button>
<button onclick="redoMove()">↪ Redo</button>
<button onclick="resetGame()">🔄 Restart</button>
<button class="action-btn" onclick="toggleMusic()">🎵 Mute/Unmute Music</button>

</div>

</div>

<div class="sidebar">

<h2>🌱 Crop Rotation Principle</h2>

<ul>
<li>Deep-rooted crops use nutrients from deep soil.</li>
<li>Shallow-rooted crops use nutrients from the topsoil.</li>
<li>Legumes restore nitrogen to the soil.</li>
<li>Cereals then use the improved nutrients.</li>
</ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
